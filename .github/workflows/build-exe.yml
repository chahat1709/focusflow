name: Build FocusFlow EXE

on:
  workflow_dispatch:  # Manual trigger
  push:
    branches: [ main, master ]
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name="FocusFlow" --add-data "assets;assets" --add-data "src;src" --hidden-import=flask --hidden-import=pylsl --hidden-import=pygame --hidden-import=bleak --hidden-import=python-osc --hidden-import=scipy --hidden-import=numpy start_app_monolith.py
        
    - name: Create Release Package
      run: |
        New-Item -ItemType Directory -Path FocusFlow_Release -Force
        Copy-Item dist\FocusFlow.exe FocusFlow_Release\
        Copy-Item README_CLIENT.md FocusFlow_Release\README.txt
        "Just double-click FocusFlow.exe to launch the app!" | Out-File -FilePath FocusFlow_Release\INSTRUCTIONS.txt
        
    - name: Upload EXE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FocusFlow-Windows-EXE
        path: FocusFlow_Release/
    
    - name: Build Professional Installer with Inno Setup
      run: |
        # Use Chocolatey to install Inno Setup (Faster & Reliable)
        choco install innosetup --no-progress
        
        # Add to PATH (refreshenv doesn't always work in GitHub Actions sub-shell, so use direct path)
        $env:Path += ";C:\Program Files (x86)\Inno Setup 6"
        
        # Compile the installer
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss
        
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FocusFlow-Setup-Installer
        path: installer_output/FocusFlow_Setup.exe
        
    - name: Create GitHub Release (if tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/FocusFlow.exe
          installer_output/FocusFlow_Setup.exe
        body: |
          ## Focus Flow - Professional EEG Monitor
          
          **Installation Options:**
          1. **Recommended:** Download `FocusFlow_Setup.exe` and run the installer wizard
          2. **Portable:** Download `FocusFlow.exe` (single file, no installation)
          
          **How to use:**
          1. Double-click to launch
          2. Click "Connect Muse" button
          3. Start monitoring!
          
          **System Requirements:**
          - Windows 10/11
          - Bluetooth enabled
          - Muse headband
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
