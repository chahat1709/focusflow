<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4BF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7DD3FC;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Brain wave flow transforming to infinity -->
  <path d="M 40 100 Q 60 80, 80 100 T 120 100 Q 140 120, 160 100" 
        stroke="url(#flowGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Infinity symbol -->
  <path d="M 60 100 Q 80 60, 100 100 Q 120 140, 140 100 Q 120 60, 100 100 Q 80 140, 60 100" 
        fill="url(#flowGradient)" opacity="0.3"/>
  
  <!-- Central droplet/focal point -->
  <circle cx="100" cy="100" r="8" fill="url(#flowGradient)"/>
  
  <!-- Animated pulse rings -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="url(#flowGradient)" stroke-width="2" opacity="0.6">
    <animate attributeName="r" from="20" to="40" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" from="0.6" to="0" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
